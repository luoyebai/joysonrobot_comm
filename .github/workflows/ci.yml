name: C++ CI

on:
  push:
    branches: [release]
  pull_request:
    branches: [main]

concurrency:
  group: C++-CI
  cancel-in-progress: true

jobs:
  build_and_check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang-format clang-tidy cppcheck
          sudo apt-get install python3-dev python3-pip
          sudo apt-get install pybind11-dev libtinyxml2-9 libssl3
          pip3 install pybind11-stubgen

      # 3️⃣ Check code formatting (clang-format)
      - name: Check code formatting (clang-format)
        run: |
          find . -regex '.*\.\(cpp\|h\|hpp\)$' \
          -not -path './build/*' \
          -not -path './include/idl/*' \
          -not -path './idl/genfiles/*' \
          -not -path './tests/test_tools/*' \
          -not -path './third_party/*' \
          | xargs clang-format -style=file -i
          git diff --exit-code || { echo "Code formatting differs!"; exit 1; }

      # 4️⃣ Static analysis with clang-tidy
      - name: Static analysis (clang-tidy)
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON .. && cd ..
          # Use compile_commands.json
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            git fetch origin main
            git diff origin/main --name-only -- '*.cpp' '*.h' '*.hpp' | \
            xargs -r -I {} git diff origin/main -- {} | \
            clang-tidy-diff -p build
          else
            find . -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | \
            xargs clang-tidy -p build
          fi

      # 5️⃣ Build the project
      - name: Build project
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build . -- -j$(nproc)

      # 6️⃣ Run unit tests
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
